        href: https://github.com/Baukebrenninkmeijer

  back-to-top-navigation: true

  page-footer:
    left: "© 2026 Bauke Brenninkmeijer"
    right:
      - icon: github
        href: https://github.com/Baukebrenninkmeijer
      - icon: linkedin
        href: https://www.linkedin.com/in/bauke-brenninkmeijer-40143310b/

  favicon: posts/images/favicon.png
  open-graph: true
  twitter-card:
    card-style: summary_large_image

  google-analytics: G-YG1RDE9BKY

format:
  html:
    theme:
      light: [lux, styles/theme-light.scss]
      dark: [lux, styles/theme-dark.scss]
    css: styles/styles.scss
    lightbox: true
    code-annotations: hover

execute:
  freeze: auto
